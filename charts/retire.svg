<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">룰 진화 = 측정으로 헛가설 폐기 / rules retire on measurement</text>
  <text x="280" y="46" text-anchor="middle" font-size="12" fill="#666">T4 · reg_pressure 헛가설 8라운드 발화 / false hypothesis fires 8 rounds</text>

  <!-- plot frame -->
  <line x1="70" y1="90" x2="70" y2="270" stroke="#ccc"/>
  <line x1="70" y1="270" x2="500" y2="270" stroke="#ccc"/>
  <text x="285" y="298" text-anchor="middle" font-size="11" fill="#888">round →</text>

  <!-- round ticks 1..8 -->
  <!-- x = 90 + (r-1)*54 -->
  <g font-size="10" fill="#aaa" text-anchor="middle">
    <text x="90"  y="286">1</text><text x="144" y="286">2</text><text x="198" y="286">3</text>
    <text x="252" y="286">4</text><text x="306" y="286">5</text><text x="360" y="286">6</text>
    <text x="414" y="286">7</text><text x="468" y="286">8</text>
  </g>

  <!-- OFF track: flat, never retires. y=210 -->
  <polyline points="90,210 144,210 198,210 252,210 306,210 360,210 414,210 468,210"
            fill="none" stroke="#e06666" stroke-width="3"/>
  <g fill="#e06666">
    <circle cx="90" cy="210" r="4"/><circle cx="144" cy="210" r="4"/><circle cx="198" cy="210" r="4"/>
    <circle cx="252" cy="210" r="4"/><circle cx="306" cy="210" r="4"/><circle cx="360" cy="210" r="4"/>
    <circle cx="414" cy="210" r="4"/><circle cx="468" cy="210" r="4"/>
  </g>
  <text x="484" y="214" font-size="11" font-weight="600" fill="#cc0000">OFF</text>
  <text x="484" y="228" font-size="10" fill="#cc0000">retire=0</text>

  <!-- ON track: retires at round 4, drops. y=150 -> retire marker -->
  <polyline points="90,150 144,150 198,150 252,150"
            fill="none" stroke="#6aa84f" stroke-width="3"/>
  <polyline points="252,150 252,120 306,120 360,120 414,120 468,120"
            fill="none" stroke="#6aa84f" stroke-width="3" stroke-dasharray="1"/>
  <g fill="#6aa84f">
    <circle cx="90" cy="150" r="4"/><circle cx="144" cy="150" r="4"/><circle cx="198" cy="150" r="4"/>
    <circle cx="252" cy="150" r="4"/>
    <circle cx="306" cy="120" r="4"/><circle cx="360" cy="120" r="4"/>
    <circle cx="414" cy="120" r="4"/><circle cx="468" cy="120" r="4"/>
  </g>
  <text x="484" y="124" font-size="11" font-weight="600" fill="#38761d">ON</text>
  <text x="484" y="138" font-size="10" fill="#38761d">retire=1</text>

  <!-- retire marker at round 4 -->
  <line x1="252" y1="150" x2="252" y2="120" stroke="#f1c232" stroke-width="2"/>
  <circle cx="252" cy="135" r="9" fill="#fff3cc" stroke="#bf9000" stroke-width="2"/>
  <text x="252" y="139" text-anchor="middle" font-size="11" font-weight="800" fill="#bf9000">✕</text>
  <text x="252" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#bf9000">retire</text>
  <text x="252" y="92" text-anchor="middle" font-size="9" fill="#999">틀린 룰 폐기 → 전환</text>

  <!-- caption: latency flat both -->
  <rect x="70" y="312" width="430" height="34" rx="6" fill="#f5f5f5"/>
  <text x="80" y="327" font-size="10.5" fill="#555">⚠ latency 둘 다 평평 48.4ms (T4 fp32 천장) — gain 아님. <tspan font-weight="700" fill="#333">차이는 retire에서만.</tspan></text>
  <text x="80" y="342" font-size="10.5" fill="#555">latency flat both tracks — the difference is the retire, not speed. This is what prior systems can't do.</text>
</svg>
