<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="520" height="340" fill="#ffffff"/>
  <text x="260" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">kb_matmul_scalar — evolution ON beats OFF at the endpoint</text>
  <text x="260" y="48" text-anchor="middle" font-size="12" fill="#666">A100 · 오탐 retire가 올바른 룰 발화를 열어 gain 도달 / retire opens the path to gain</text>

  <!-- axes -->
  <line x1="80" y1="270" x2="480" y2="270" stroke="#ccc" stroke-width="1"/>
  <text x="70" y="274" text-anchor="end" font-size="10" fill="#999">0</text>
  <text x="70" y="120" text-anchor="end" font-size="10" fill="#999">319</text>
  <text x="60" y="200" text-anchor="middle" font-size="10" fill="#999" transform="rotate(-90 60 200)">best latency (us)</text>

  <!-- OFF bar: 319.1us (scaled: height 154, top at y=116) -->
  <rect x="140" y="116" width="90" height="154" fill="#e06666" rx="3"/>
  <text x="185" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#cc0000">319.1 us</text>
  <text x="185" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#333">evolution OFF</text>
  <text x="185" y="306" text-anchor="middle" font-size="10" fill="#888">fp32 misfire forever · retire 0</text>

  <!-- ON bar: 55.5us (scaled: 55.5/319.1*154 = 27, top at y=243) -->
  <rect x="330" y="243" width="90" height="27" fill="#6aa84f" rx="3"/>
  <text x="375" y="235" text-anchor="middle" font-size="15" font-weight="700" fill="#38761d">55.5 us</text>
  <text x="375" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#333">evolution ON</text>
  <text x="375" y="306" text-anchor="middle" font-size="10" fill="#888">retire → uncoalesced → coalesced tile</text>

  <!-- speedup arrow -->
  <path d="M 235 150 Q 285 130 325 247" fill="none" stroke="#f1c232" stroke-width="2.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f1c232"/>
    </marker>
  </defs>
  <rect x="244" y="158" width="74" height="26" rx="13" fill="#fff3cc" stroke="#f1c232"/>
  <text x="281" y="176" text-anchor="middle" font-size="15" font-weight="800" fill="#bf9000">5.75×</text>

  <text x="260" y="330" text-anchor="middle" font-size="11" fill="#555">same callback·variant pool, only evolver differs — reproduced in 3 independent runs (5.82/5.78/5.75×)</text>
</svg>
